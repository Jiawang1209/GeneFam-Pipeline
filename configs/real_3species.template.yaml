project:
  name: My_3species_GDSL
  outdir: results/My_3species_GDSL

runtime:
  environment: GeneFamilyFlow
  r_bin: /usr/local/bin/R

input:
  mode: auto
  root: data/species_bank
  required:
    pep: true
    gff3: true
    cds: false
    genome: false
  patterns:
    pep:
      - "*.pep.fa"
      - "*.pep.fasta"
      - "*.protein.fa"
      - "*.faa"
    cds:
      - "*.cds.fa"
      - "*.cds.fasta"
    genome:
      - "*.genome.fa"
      - "*.genome.fasta"
      - "*.dna.fa"
      - "*.dna.fasta"
      - "*.fna"
    gff3:
      - "*.gff3"
      - "*.gff"

species:
  include:
    - Arabidopsis_thaliana
    - Brassica_rapa
    - Capsella_rubella
  exclude: []

run:
  species_group: null

gene_family:
  name: GDSL
  hmm_profiles:
    - id: PF00657
      path: data/hmm_profiles/PF00657.hmm
  reference_peptides: data/reference/GDSL_reference.pep.fa
  min_length: null
  max_length: null

identification:
  use_hmmer: true
  use_diamond: true
  hmm_evalue: 1.0e-10
  diamond_evalue: 1.0e-10
  final_rule: intersection

domain_filtering:
  hmmer_max_evalue: 1.0e-10
  hmmer_min_bitscore: 50.0
  hmmer_min_domain_coverage: 0.35

wgd_events:
  named_event_annotation: false
  event_map: null

plotting:
  reuse_reference_scripts: true
  gene_family_species_order: null
  syntenic_pairs: null
  reference_script_roots:
    - Reference/Long_Weixiong_20240323_1_GDSL/R
    - Reference/Large-Scale Plant Genomic Identification and Analysis Uncover ASMT:COMT Copy Number Variation Driving Melatonin Dosage Balance./source_code
  reuse_policy: adapt_not_modify

promoter:
  cis_elements: null

ppi:
  edges: null
  nodes: null

dev:
  mock_external_tools: false
  mock_evidence_dir: null

modules:
  identification: true
  domain_filtering: true
  family_summary: true
  feature_summary: false
  phylogeny: true
  motif: false
  synteny: false
  promoter: false
  promoter_cis: false
  ppi: false
  duplication_retention: false
  kaks: false
  chromosome_location: true
  expression: false
  report: true
