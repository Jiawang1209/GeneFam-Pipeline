description: GeneFam-Pipeline configuration contract.
required_sections:
  - project
  - input
  - runtime
  - species
  - gene_family
  - identification
  - plotting
  - modules
fields:
  project.name: string
  project.outdir: path
  runtime.environment: shared runtime environment name, default GeneFamilyFlow
  runtime.r_bin: absolute R binary path, default /usr/local/bin/R
  input.mode: auto or manifest
  input.root: path to species bank when input.mode is auto
  species.include: all or list of species IDs
  species.exclude: list of species IDs
  run.species_group: null or a key from configs/species_groups.yaml
  gene_family.name: string
  gene_family.hmm_profiles: list of id/path objects
  identification.use_hmmer: boolean, default true; enables HMMER profile search input generation
  identification.use_diamond: boolean, default true; enables DIAMOND/BLAST-like confirmation input generation
  identification.final_rule: intersection, union, or hmmer_only
  domain_filtering.hmmer_max_evalue: maximum accepted HMMER e-value
  domain_filtering.hmmer_min_bitscore: minimum accepted HMMER bitscore
  domain_filtering.hmmer_min_domain_coverage: minimum HMM coordinate coverage from 0 to 1
  wgd_events.named_event_annotation: boolean
  plotting.reuse_reference_scripts: boolean
  plotting.reference_script_roots: list of Reference directories containing reusable plotting scripts
  plotting.reuse_policy: adapt_not_modify
  dev.mock_external_tools: boolean flag for offline MVP verification
  dev.mock_evidence_dir: directory containing hmmer.tsv and diamond.tsv when mock mode is enabled
module_dependency_rules:
  modules.identification: requires at least one enabled search tool, identification.use_hmmer or identification.use_diamond
  modules.kaks: requires input.required.cds true
  modules.chromosome_location: requires input.required.gff3 true
  modules.expression: requires expression.matrix
  modules.phylogeny: requires modules.family_summary true
  modules.motif: requires modules.family_summary true
  modules.duplication_retention: requires modules.synteny true and modules.kaks true
